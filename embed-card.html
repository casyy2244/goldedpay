<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #000;
    font-family: 'Arial Black', Arial, sans-serif;
    position: relative;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 1200px;
    height: 630px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 2;
  }

  /* Vignette edges */
  .overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    pointer-events: none;
  }

  .badge {
    position: relative;
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #9333ea;
    box-shadow: 0 0 12px #9333ea, 0 0 24px rgba(147,51,234,0.5);
  }

  .logo-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap img {
    max-width: 480px;
    max-height: 260px;
    object-fit: contain;
    filter: drop-shadow(0 0 40px rgba(147,51,234,0.4)) drop-shadow(0 0 80px rgba(147,51,234,0.2));
  }

  .tagline {
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    font-family: Arial, sans-serif;
    font-weight: normal;
  }

  .join-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 38px;
    border: 2.5px solid rgba(255,255,255,0.85);
    border-radius: 999px;
    background: transparent;
    color: #fff;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  .url-tag {
    position: absolute;
    bottom: 22px;
    right: 28px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: Arial, sans-serif;
    z-index: 3;
  }

  /* Purple glow behind logo area */
  .glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(147,51,234,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="glow-center"></div>

<div class="overlay">
  <div class="badge">
    <span class="dot"></span>
    Active
  </div>
  <div class="logo-wrap">
    <img src="123213213.png" alt="GOLDED" />
  </div>
  <p class="tagline">#1 Content On The Internet</p>
  <div class="join-btn">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
    </svg>
    JOIN NOW →
  </div>
</div>

<div class="url-tag">goldedpay.org</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width  = 1200;
const H = c.height = 630;

function rand(a, b) { return Math.random() * (b - a) + a; }

const stars = Array.from({ length: 320 }, () => ({
  x: rand(0, W),
  y: rand(0, H),
  r: rand(0.15, 1.3),
  alpha: rand(0.2, 1),
  phase: rand(0, Math.PI * 2),
}));

// Draw one static frame (this is a static image generator)
const t = 1200;
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);

for (const s of stars) {
  const a = s.alpha * (0.4 + 0.6 * Math.sin(t * 0.0008 + s.phase));
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${Math.max(0, a).toFixed(2)})`;
  ctx.fill();
}

// A couple of "shooting star" streaks for visual flair
const shoots = [
  { x: 200, y: 80,  len: 140, angle: 0.28 },
  { x: 900, y: 160, len: 100, angle: 0.22 },
];
for (const ss of shoots) {
  const dx = Math.cos(ss.angle) * ss.len;
  const dy = Math.sin(ss.angle) * ss.len;
  const g = ctx.createLinearGradient(ss.x, ss.y, ss.x + dx, ss.y + dy);
  g.addColorStop(0, 'rgba(255,255,255,0.7)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.moveTo(ss.x, ss.y);
  ctx.lineTo(ss.x + dx, ss.y + dy);
  ctx.strokeStyle = g;
  ctx.lineWidth = 1.2;
  ctx.stroke();
}
</script>
</body>
</html>
